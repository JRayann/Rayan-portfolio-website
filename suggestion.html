<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Suggestions | Rayan Alharthi</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="cursor"></div>

<section class="suggestion-page">

    <div class="suggestion-box">

        <a href="index.html" class="back-home">
            ← Back To Home
        </a>

        <h1>Suggestions & Feedback</h1>

        <p>
            Share your suggestions, feedback, or ideas.
        </p>

        <form action="https://formspree.io/f/mkoydrkj"
method="POST"
id="suggestionForm">

            <input type="text"
            name="Full Name"
            placeholder="Your Name"
            required>

            <input type="tel"
            name="Phone Number"
            placeholder="Phone Number"
            required>

            <input type="email"
            name="Email"
            placeholder="Email Address"
            required>

            <textarea
            name="Suggestion"
            placeholder="Write your suggestion..."
            rows="7"
            required></textarea>

            <input type="hidden"
name="_subject"
value="New Suggestion From Portfolio">

            <button type="submit">
                Send Suggestion
            </button>

        </form>

    </div>

</section>

<script src="script.js"></script>

<script>

const form =
document.getElementById('suggestionForm');

form.addEventListener('submit', async (e) => {

    e.preventDefault();

    const data = new FormData(form);

    const response = await fetch(form.action, {

        method:'POST',

        body:data,

        headers:{
            'Accept':'application/json'
        }

    });

    if(response.ok){

        form.innerHTML = `

        <div class="success-message">

            Thank you! Your suggestion has been sent successfully!

        </div>

        `;

    }

});

</script>

</body>

</html>
