<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Settings</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<section class="login-box">
  <span>ADMIN SETTINGS</span>
  <h1>Account Settings</h1>

  <input id="newUsername" type="text" placeholder="New Username">
  <input id="newPassword" type="password" placeholder="New Password">

  <button id="saveSettings">Save Changes</button>

  <p id="settingsMessage" style="display:none;color:#4ade80;margin-top:16px;">
    Account updated successfully.
  </p>

  <br><br>
  <a href="admin.html" style="color:#4ade80;text-decoration:none;">← Back to Dashboard</a>
</section>

<script src="admin-settings.js"></script>

</body>
</html>
